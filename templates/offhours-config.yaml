{{- if .Values.features.gatus }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: offhours-route
  namespace: {{ .Values.projectName }}-system
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-infra
  hostnames:
    - "offhours-{{ .Values.projectName }}.3istor.com"
  rules:
    - backendRefs:
        - name: offhours-guard 
          port: 8082
{{- end }}